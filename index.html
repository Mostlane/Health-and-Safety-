<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mostlane &mdash; Construction Phase H&amp;S Plan Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style id="appstyle">
  :root{
    --brand:#1b5a9b;          /* Mostlane blue */
    --brand-dark:#134272;
    --brand-light:#e7eff6;
    --line:#ccd6e0;
    --ink:#1c2530;
    --muted:#5a6675;
    --paper:#fff;
    --head:"Barlow Condensed", "Arial Narrow", Arial, sans-serif;
    --body:"Barlow", Arial, Helvetica, sans-serif;
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:var(--body);
    color:var(--ink);
    background:#eef1f5;
    -webkit-text-size-adjust:100%;
  }

  /* ---------- Layout (screen) ---------- */
  .layout{display:flex;min-height:100vh}
  .form-pane{
    width:430px;
    flex:0 0 430px;
    background:var(--paper);
    border-right:1px solid var(--line);
    padding:18px 20px 80px;
    overflow-y:auto;
    height:100vh;
    position:sticky;
    top:0;
  }
  .doc-pane{
    flex:1;
    padding:28px;
    overflow-y:auto;
    height:100vh;
  }

  .app-title{font-size:18px;color:var(--brand);margin:0 0 2px}
  .app-sub{font-size:12px;color:var(--muted);margin:0 0 16px}

  .toolbar{
    display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;
    position:sticky;top:-18px;background:var(--paper);padding:10px 0;z-index:5;
    border-bottom:1px solid var(--line);
  }
  button{
    font:inherit;cursor:pointer;border:1px solid var(--brand);
    background:var(--brand);color:#fff;border-radius:6px;padding:9px 14px;
  }
  button.secondary{background:#fff;color:var(--brand)}
  button.small{padding:4px 9px;font-size:12px}
  button.danger{border-color:#a33;color:#a33;background:#fff}
  button:hover{filter:brightness(.96)}

  details.group{
    border:1px solid var(--line);border-radius:8px;margin-bottom:12px;
    background:#fbfcfe;overflow:hidden;
  }
  details.group>summary{
    cursor:pointer;padding:11px 14px;font-weight:bold;color:var(--brand);
    background:var(--brand-light);list-style:none;user-select:none;
  }
  details.group>summary::-webkit-details-marker{display:none}
  details.group>summary::before{content:"\25B8  ";color:var(--brand)}
  details.group[open]>summary::before{content:"\25BE  "}
  .group-body{padding:12px 14px}

  label.field{display:block;margin-bottom:11px;font-size:13px}
  label.field>span.lbl{display:block;font-weight:bold;margin-bottom:3px}
  label.field>span.help{display:block;font-weight:normal;color:var(--muted);font-size:11px;margin-bottom:4px}
  input[type=text], textarea, select{
    width:100%;padding:7px 8px;border:1px solid var(--line);border-radius:5px;
    font:inherit;background:#fff;
  }
  textarea{min-height:64px;resize:vertical;line-height:1.4}

  .repeat-row{
    border:1px dashed var(--line);border-radius:6px;padding:10px;margin-bottom:10px;
    background:#fff;position:relative;
  }
  .repeat-row .row-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
  .repeat-row .row-head b{font-size:12px;color:var(--muted)}
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:8px}

  .hint{font-size:12px;color:var(--muted);margin:0 0 14px;line-height:1.5}

  /* ---------- Document (the printable plan) ---------- */
  .doc-pane{background:#dce2ea}
  .page{
    position:relative;
    background:var(--paper);
    width:210mm;
    max-width:100%;
    min-height:297mm;
    margin:0 auto 20px;
    padding:14mm 16mm 12mm;
    box-shadow:0 2px 12px rgba(20,40,70,.18);
    font-size:11.5px;
    line-height:1.55;
    color:var(--ink);
    display:flex;            /* lets the footer sit at the bottom of the page */
    flex-direction:column;
  }

  /* running header (company details) at the top of every page */
  .doc .runhead{
    display:flex;align-items:center;justify-content:space-between;gap:14px;flex:0 0 auto;
    border-bottom:2px solid var(--brand);padding-bottom:8px;margin-bottom:14px;
  }
  .doc .runhead img{height:30px;width:auto}
  .doc .runhead .rh-co{font-family:var(--head);font-size:9.5px;line-height:1.4;color:var(--muted);text-align:right}
  .doc .runhead .rh-co b{display:block;font-size:12px;color:var(--brand-dark);letter-spacing:.05em;text-transform:uppercase}

  /* headings */
  .doc h1{font-family:var(--head);font-weight:700;font-size:30px;line-height:1.05;
    color:var(--brand-dark);letter-spacing:.01em;margin:0 0 14px}
  .doc h2{font-family:var(--head);font-weight:600;font-size:17px;text-transform:uppercase;
    letter-spacing:.04em;color:var(--brand-dark);margin:22px 0 10px;
    padding:6px 0 6px 12px;border-left:5px solid var(--brand);background:var(--brand-light)}
  .doc h3{font-family:var(--head);font-weight:600;font-size:13.5px;text-transform:uppercase;
    letter-spacing:.05em;color:var(--brand);margin:16px 0 5px}
  .doc h4{font-family:var(--head);font-weight:600;font-size:12px;text-transform:uppercase;
    letter-spacing:.04em;color:var(--ink);margin:13px 0 3px}
  .doc p{margin:0 0 9px;text-align:justify}
  .doc ul{margin:0 0 9px;padding-left:20px}

  /* tables */
  .doc table{width:100%;border-collapse:collapse;margin:10px 0 16px;font-size:10.8px}
  .doc th,.doc td{border:1px solid #c4cedb;padding:6px 8px;text-align:left;vertical-align:top}
  .doc thead th, .doc tr:first-child th{background:var(--brand);color:#fff;font-family:var(--head);
    text-transform:uppercase;letter-spacing:.04em;font-weight:600;border-color:var(--brand)}
  .doc th{background:var(--brand-light);color:var(--brand-dark);font-weight:600}
  .doc tbody tr:nth-child(even) td{background:#f5f8fb}

  /* ----- cover page ----- */
  .doc .cover{padding:0;overflow:hidden}
  .doc .cover .cover-body{flex:1 0 auto;display:flex;flex-direction:column}
  .doc .cover .band{background:var(--brand);color:#fff;padding:24mm 18mm 16mm;position:relative;flex:0 0 auto}
  .doc .cover .band::after{content:"";position:absolute;left:0;right:0;bottom:0;height:6px;background:var(--brand-dark)}
  .doc .cover .cover-logo{background:#fff;display:inline-block;padding:14px 18px;border-radius:4px;margin-bottom:26px}
  .doc .cover .cover-logo img, .doc .cover .cover-logo svg{height:54px;width:auto;display:block}
  .doc .cover .kicker{font-family:var(--head);text-transform:uppercase;letter-spacing:.08em;
    font-size:11px;opacity:.9;margin:0 0 10px;line-height:1.4}
  .doc .cover h1{color:#fff;font-size:40px;margin:0}
  .doc .cover .cover-body{padding:16mm 18mm}
  .doc .cover .sitecard{border:1px solid var(--line);border-top:4px solid var(--brand);
    border-radius:4px;padding:14px 16px;margin:0 0 16px;background:#fafcfe}
  .doc .cover .sitecard .lab{font-family:var(--head);text-transform:uppercase;letter-spacing:.06em;
    font-size:10px;color:var(--muted);margin:0 0 2px}
  .doc .cover .sitecard .big{font-family:var(--head);font-weight:600;font-size:20px;color:var(--brand-dark);margin:0 0 8px}
  .doc .cover .meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 24px}

  /* misc */
  .doc .company-block{font-size:11px;line-height:1.45}
  .doc .footer-note{margin-top:auto;flex:0 0 auto;          /* pinned to the bottom of the page */
    font-family:var(--head);font-size:9.5px;letter-spacing:.04em;color:var(--muted);
    border-top:1px solid var(--line);padding-top:6px;display:flex;align-items:center;gap:7px}
  .doc .footer-note img{max-height:18px}
  .doc .appendix-tab{font-family:var(--head);font-size:46px;font-weight:700;color:#b4c6d8;
    text-align:right;margin:0;line-height:1;letter-spacing:.04em}
  .doc .appendix-tab b{color:var(--brand)}
  .doc .danger-tag{display:inline-block;background:#fff;border:1.5px solid #c0392b;color:#922;
    padding:3px 12px;border-radius:20px;font-family:var(--head);text-transform:uppercase;
    letter-spacing:.05em;font-weight:600;font-size:11px}
  .doc .route-meta{background:var(--brand-light);border-left:4px solid var(--brand);
    padding:8px 12px;border-radius:0 4px 4px 0;margin:8px 0}
  .doc figure{margin:8px 0 14px}
  .doc figure img{display:block;width:100%;border:1px solid #c4cedb;border-radius:4px}
  .doc figcaption{font-family:var(--head);text-transform:uppercase;letter-spacing:.05em;
    font-size:9.5px;color:var(--muted);margin-top:4px}
  .risk-high{background:#f5c6c6}.risk-med{background:#fde9b8}.risk-low{background:#cdeacd}

  /* ---------- Map modals (screen only) ---------- */
  .modal-overlay{position:fixed;inset:0;background:rgba(12,22,38,.55);z-index:1000;
    display:flex;align-items:center;justify-content:center;padding:18px}
  .modal{background:#fff;border-radius:8px;width:min(940px,96vw);max-height:94vh;
    display:flex;flex-direction:column;overflow:hidden;box-shadow:0 12px 44px rgba(0,0,0,.4)}
  .modal-head{display:flex;justify-content:space-between;align-items:center;gap:10px;
    padding:12px 16px;background:var(--brand);color:#fff;font-family:var(--head);
    font-size:15px;text-transform:uppercase;letter-spacing:.04em}
  .modal-head .mx{background:transparent;border:none;color:#fff;font-size:24px;line-height:1;cursor:pointer;padding:0 4px}
  .modal-body{padding:14px 16px;overflow:auto}
  .modal-foot{padding:12px 16px;border-top:1px solid var(--line);display:flex;
    gap:8px;justify-content:space-between;align-items:center;flex-wrap:wrap}
  .modal .map{height:52vh;min-height:320px;border:1px solid var(--line);border-radius:6px}
  .modal .map-search{width:100%;padding:9px 10px;border:1px solid var(--line);border-radius:5px;margin-bottom:8px;font:inherit}
  .modal .tools{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
  .modal .ae-list{max-height:150px;overflow:auto}
  .modal .ae-list .repeat-row{margin-bottom:6px}
  .modal .rinfo{font-family:var(--head);color:var(--brand-dark);font-weight:600}

  /* ---------- Print ---------- */
  @page{size:A4;margin:0}
  @media print{
    body{background:#fff}
    .form-pane,.toolbar,.no-print,.modal-overlay{display:none !important}
    .layout{display:block}
    .doc-pane{height:auto;overflow:visible;padding:0;background:#fff}
    .page{
      box-shadow:none;margin:0;width:auto;min-height:296mm;padding:13mm 14mm;
      page-break-after:always;
    }
    .page.cover{padding:0}
    .page:last-child{page-break-after:auto}
    .doc figure, .doc table, .doc h2{page-break-inside:avoid}
  }
</style>
</head>
<body>
<div class="layout">

  <!-- ============ FORM PANE ============ -->
  <div class="form-pane">
    <h1 class="app-title">Construction Phase H&amp;S Plan</h1>
    <p class="app-sub">Mostlane Construction Ltd &mdash; job set-up questionnaire <span style="opacity:.6">&middot; build 2026-06-11c</span></p>

    <div class="toolbar">
      <button id="btnPrint">Save / Print PDF</button>
      <button id="btnPreview" class="secondary">Preview PDF</button>
      <button id="btnNew" class="secondary">Start new job</button>
      <button id="btnExample" class="secondary small">Load example</button>
      <button id="btnSave" class="secondary small">Backup answers</button>
      <button id="btnLoad" class="secondary small">Restore answers</button>
    </div>

    <p class="hint">
      Fill in the fields below &mdash; the document on the right updates as you type.
      When it looks right, click <b>Save / Print PDF</b> and choose
      &ldquo;Save as PDF&rdquo;. Your answers are kept in this browser automatically.
    </p>

    <div id="formRoot"></div>
    <input type="file" id="fileInput" accept="application/json" class="no-print" style="display:none">
  </div>

  <!-- ============ DOCUMENT PANE ============ -->
  <div class="doc-pane">
    <div id="docRoot" class="doc"></div>
  </div>
</div>

<script>
/* ============================================================
   1. FIELD CONFIGURATION
   Edit this list to add / remove / rename questions.
   type: text | textarea | select | issues | directory
   ============================================================ */
const GROUPS = [
  { title:"Company branding", open:true, fields:[
    { id:"_brand", label:"Brand colour", type:"color", def:"#1b5a9b",
      help:"Used for headings, table headers and accents throughout the plan." },
    { id:"_logo",  label:"Company logo", type:"logo",
      help:"PNG or JPG. Appears on the cover and at the foot of every page. Stored in this browser and included in your backup file." },
    { id:"_mapsKey", label:"Google Maps API key (override)", type:"text",
      help:"A Mostlane key is already built in, so the map features work without entering anything here. Only fill this in to use a different key (it overrides the built-in one and is stored only in this browser)." },
  ]},

  { title:"1. Project & issue details", open:true, fields:[
    { id:"projectName",  label:"Project / site name", type:"text", def:"Lake Road Surgery" },
    { id:"siteAddress",  label:"Site address", type:"textarea", def:"Lake Road\nVerwood\nBH31 6EH",
      help:"One line per row." },
    { id:"projectNo",    label:"Project number", type:"text", def:"45105" },
    { id:"projectRef",   label:"Project reference", type:"text", def:"MOS0552/00012" },
    { id:"scheme",       label:"Scheme description", type:"text",
      def:"Demolition, extension & refurbishment of existing Building" },
    { id:"duration",     label:"Project duration", type:"text", def:"16 Weeks" },
    { id:"workingHours", label:"Working hours", type:"text", def:"08:00 – 16:30 Mon – Fri" },
    { id:"asbestos",     label:"Asbestos likely (build date)?", type:"select", options:["Yes","No"], def:"Yes" },
    { id:"issues",       label:"Issue / revision history", type:"issues" },
  ]},

  { title:"2. Mostlane project team", open:false, fields:[
    { id:"officeTel",          label:"Office telephone", type:"text", def:"02380 262 000" },
    { id:"projectDirector",    label:"Project Director", type:"text", def:"Joe Line" },
    { id:"projectDirectorMob", label:"Project Director mobile", type:"text", def:"07774 252851" },
    { id:"contractsManager",   label:"Contracts Manager(s)", type:"text", def:"Joe Line / Jamie Line" },
    { id:"contractsManagerTel",label:"Contracts Manager phone", type:"text", def:"07771 357346" },
    { id:"siteManager",        label:"Site Manager", type:"text", def:"Chris Freeman" },
    { id:"siteManagerTel",     label:"Site Manager phone", type:"text", def:"07770 572991" },
  ]},

  { title:"3. Site-specific arrangements", open:false, fields:[
    { id:"welfare", label:"Welfare facilities & first aid (site set-up)", type:"textarea",
      def:"Welfare facilities including toilet, hot and cold running water and a sink will be provided on site by the client in the form of the area in the bungalow on the site that has been set aside for the use of Mostlane Construction Ltd employees and sub-contractors for the duration of the project. A portaloo will be supplied when services have to be removed during the refurbishment." },
    { id:"accessEgress", label:"Access & egress (incl. deliveries)", type:"textarea",
      def:"Access is restricted to working area only. Access to site is only via staff entrance and no vans or deliveries should use the main surgery car park or entrance. Deliveries will be carried out by Mostlane Construction Ltd direct to site operatives." },
    { id:"stability", label:"Stability of existing structure", type:"textarea", def:"N/A" },
    { id:"fallPrevention", label:"Fall prevention (scaffold / access notes)", type:"textarea",
      def:"For this project it is anticipated that a Stairwell Tower Scaffold may be used. This will be assembled by the site supervisor who is PASMA trained and he will also record inspections for each time the Stairwell tower scaffold is erected." },
    { id:"lifting", label:"Lifting operations", type:"textarea",
      def:"It is not anticipated that there will be any lifting operations carried out on this project." },
    { id:"traffic", label:"Traffic routes & segregation", type:"textarea",
      def:"Care to be taken that this is a busy car park used by the public all day." },
    { id:"storage", label:"Storage of materials & compound", type:"textarea",
      def:"A compound area will be agreed in designated car park spaces in the car park area and will be made up with locked Heras fencing." },
  ]},

  { title:"4. Project directory (Appendix A & D)", open:false, fields:[
    { id:"directory", label:"Project directory contacts", type:"directory" },
  ]},

  { title:"5. Risk assessment summary (Appendix B)", open:false, fields:[
    { id:"ramsTitle",     label:"RAMS title", type:"text", def:"Lake Road Surgery - Internal Alterations" },
    { id:"ramsDanger",    label:"Overall risk level", type:"select", options:["Low Risk Activity","Medium Risk Activity","High Risk Activity"], def:"Medium Risk Activity" },
    { id:"ramsLocation",  label:"Location of activity", type:"text", def:"Lake Road Surgery, Verwood, BH31 6EH" },
    { id:"ramsDesc",      label:"Description of activity", type:"text", def:"Demolition, extension and internal refurbishment" },
    { id:"ramsEquipment", label:"Equipment used", type:"textarea", def:"General Building Tools, Cordless drills, Excavators, Breakers & General Groundworking Tools" },
    { id:"ramsSupporting",label:"Supporting documents", type:"text", def:"Risk Assessments & COSHH" },
    { id:"ramsPersons",   label:"Persons affected", type:"text", def:"Management, Supervisor, Operative, Client, Apprentice" },
    { id:"ramsNumbers",   label:"Total numbers affected", type:"text", def:"Less than 5 on site at any one time" },
    { id:"ramsFrequency", label:"Frequency of exposure", type:"text", def:"Most items most days" },
    { id:"ramsExposure",  label:"Duration of exposure", type:"text", def:"10 week contract" },
    { id:"ramsAssessor",  label:"Assessor", type:"text", def:"Joe Line" },
    { id:"ramsCreated",   label:"Created on", type:"text", def:"22/02/2026" },
    { id:"ramsReview",    label:"Review before", type:"text", def:"22/02/2028" },
  ]},

  { title:"6. Compound location (Appendix C)", open:false, fields:[
    { id:"includeCompound", label:"Include a compound location section?", type:"select", options:["Yes","No"], def:"Yes",
      help:"Set to No to leave Appendix C out of the plan entirely." },
    { id:"compoundText", label:"Compound / site set-up notes", type:"textarea",
      def:"Compound Area to include Contractor Parking.\nNo Entry to Main Car Park for Contractors or Deliveries.\nAll Entry for Contractors & Deliveries via Newtown Road.\nBeware of Staff Parking adjacent to compound area." },
    { id:"compoundMap", label:"Compound location map", type:"compoundmap",
      help:"Open the map, set the pin / compound area (drag corners & mid-points for any shape) / access-route arrow, choose the area colour, frame the zoom, then Insert the image into Appendix C." },
  ]},

  { title:"7. Local hospital / A&E (Appendix E)", open:false, fields:[
    { id:"hospitalFinder",  label:"A&E route planner", type:"hospitalfinder",
      help:"Open the planner to find/choose a hospital, see the drive distance & time, frame the map, then Insert the route image into Appendix E." },
    { id:"hospitalName",    label:"Nearest A&E hospital", type:"text", def:"Royal Bournemouth Hospital" },
    { id:"hospitalAddress", label:"Hospital address", type:"textarea", def:"Castle Lane\nBournemouth BH7 7DW" },
  ]},
];

/* Default contents for the repeatable lists */
const DEFAULT_ISSUES = [
  { no:"1", date:"22/02/26", desc:"First issue", by:"Joe Line" },
  { no:"2", date:"13/05/26", desc:"Revised Start Dates - Second Issue", by:"Joe Line" },
];
const DEFAULT_DIRECTORY = [
  { service:"Client", name:"Jo Morris (Managing Partner) / Annie Morris (Operations Manager)", company:"The Cranborne Practice", address:"Lake Road Surgery, Lake Road, Verwood BH31 6EH", phone:"01202 822825", mobile:"07825 001787", email:"jo.morris@dorsetgp.nhs.uk" },
  { service:"Architect", name:"Rhiannon North / Gareth Jenkins", company:"Studio Four Architects", address:"Tollgate Estates, Stanbridge Earls, Romsey SO51 0HE", phone:"01794 511255", mobile:"", email:"r.north@s4architects.co.uk" },
  { service:"Structural Engineer", name:"Phil Fenna", company:"R Elliott Associates", address:"Dennett House, Brighton Road, Sway SO41 6EB", phone:"01590 683176", mobile:"", email:"p.fenna@rea-ltd.co.uk" },
  { service:"CDM PD / Project Manager", name:"Joe Line (MD)", company:"Mostlane Construction Ltd", address:"Unit A5, Segensworth Business Centre, PO15 5RQ", phone:"023 8026 2000", mobile:"07774 252851", email:"joe@mostlane.com" },
  { service:"Site Manager", name:"Chris Freeman", company:"Mostlane Construction Ltd", address:"Unit A5, Segensworth Business Centre, PO15 5RQ", phone:"", mobile:"07770 572991", email:"" },
];

/* ============================================================
   2. STATE
   ============================================================ */
const STORAGE_KEY = "mostlane_cphsp_v1";
let state = {};

/* Non-question state used by the map features */
const AUX_DEFAULTS = {
  siteLatLng:null, compoundPin:null, compoundRect:null, compoundRoute:null, compoundImg:"", compoundBoxColor:"",
  hospitalLatLng:null, hospitalPolyline:"", hospitalStraight:null, hospitalRouteText:"", hospitalImg:""
};
function ensureAux(){ for(const k in AUX_DEFAULTS) if(!(k in state)) state[k]=AUX_DEFAULTS[k]; }

function blankState(){
  const s={};
  GROUPS.forEach(g=>g.fields.forEach(f=>{
    if(f.type==="issues") s[f.id]=[{no:"1",date:"",desc:"First issue",by:""}];
    else if(f.type==="directory") s[f.id]=[emptyContact()];
    else if(f.type==="color") s[f.id]=f.def||"#1b5a9b";   // keep branding on a new job
    else if(f.type==="logo") s[f.id]=state[f.id]||"";       // keep logo on a new job
    else if(f.id==="_mapsKey") s[f.id]=state[f.id]||"";     // keep maps key on a new job
    else if(f.type==="select") s[f.id]=f.def||"";           // sensible default for toggles
    else s[f.id]="";
  }));
  Object.assign(s,{...AUX_DEFAULTS});                       // fresh maps state
  return s;
}
function exampleState(){
  const s={};
  GROUPS.forEach(g=>g.fields.forEach(f=>{
    if(f.type==="issues") s[f.id]=JSON.parse(JSON.stringify(DEFAULT_ISSUES));
    else if(f.type==="directory") s[f.id]=JSON.parse(JSON.stringify(DEFAULT_DIRECTORY));
    else if(f.id==="_logo"||f.id==="_mapsKey") s[f.id]=state[f.id]||"";  // keep logo & key
    else s[f.id]=f.def||"";
  }));
  Object.assign(s,{...AUX_DEFAULTS});
  return s;
}
function emptyContact(){return {service:"",name:"",company:"",address:"",phone:"",mobile:"",email:""};}

function load(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(raw){ state=JSON.parse(raw); ensureAux(); return; }
  }catch(e){}
  state=exampleState();           // first visit shows the worked example
  ensureAux();
}
function persist(){ try{ localStorage.setItem(STORAGE_KEY,JSON.stringify(state)); }catch(e){} }

/* ============================================================
   3. HELPERS
   ============================================================ */
const esc = s => (s==null?"":String(s)).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
const nl  = s => esc(s).replace(/\n/g,"<br>");
const v   = id => state[id]||"";

/* ============================================================
   4. BUILD FORM
   ============================================================ */
const formRoot=document.getElementById("formRoot");

function buildForm(){
  formRoot.innerHTML="";
  GROUPS.forEach(group=>{
    const det=document.createElement("details");
    det.className="group"; det.open=!!group.open;
    det.innerHTML=`<summary>${esc(group.title)}</summary><div class="group-body"></div>`;
    const body=det.querySelector(".group-body");
    group.fields.forEach(f=>body.appendChild(buildField(f)));
    formRoot.appendChild(det);
  });
}

function buildField(f){
  if(f.type==="issues")        return buildIssues(f);
  if(f.type==="directory")     return buildDirectory(f);
  if(f.type==="logo")          return buildLogo(f);
  if(f.type==="compoundmap")   return buildCompoundMap(f);
  if(f.type==="hospitalfinder")return buildHospitalFinder(f);

  const wrap=document.createElement("label");
  wrap.className="field";
  let inner=`<span class="lbl">${esc(f.label)}</span>`;
  if(f.help) inner+=`<span class="help">${esc(f.help)}</span>`;
  if(f.type==="textarea"){
    inner+=`<textarea data-id="${f.id}">${esc(v(f.id))}</textarea>`;
  }else if(f.type==="color"){
    inner+=`<input type="color" data-id="${f.id}" value="${esc(v(f.id)||"#1b5a9b")}" style="width:64px;height:34px;padding:2px;cursor:pointer">`;
  }else if(f.type==="select"){
    inner+=`<select data-id="${f.id}">`+
      f.options.map(o=>`<option ${v(f.id)===o?"selected":""}>${esc(o)}</option>`).join("")+
      `</select>`;
  }else{
    inner+=`<input type="text" data-id="${f.id}" value="${esc(v(f.id))}">`;
  }
  wrap.innerHTML=inner;
  wrap.querySelector("[data-id]").addEventListener("input",e=>{
    state[f.id]=e.target.value;
    // The cached A&E route is only valid for the exact site + hospital it was built
    // from. Invalidate it whenever any of those inputs change so Appendix E never
    // shows a distance/time/map for a stale site or hospital.
    if(f.id==="siteAddress"){
      state.siteLatLng=null;                                   // re-geocode the site next time
      state.hospitalPolyline=""; state.hospitalStraight=null; state.hospitalRouteText=""; state.hospitalImg="";
    }
    if(f.id==="hospitalName"||f.id==="hospitalAddress"){
      state.hospitalLatLng=null; state.hospitalPolyline=""; state.hospitalStraight=null; state.hospitalRouteText=""; state.hospitalImg="";
    }
    persist(); renderDoc();
  });
  if(f.id==="_mapsKey"){   // once a key is entered/removed, rebuild so map widgets activate
    wrap.querySelector("[data-id]").addEventListener("change",()=>buildForm());
  }
  return wrap;
}

/* ---- repeatable: issues ---- */
function buildIssues(f){
  const box=document.createElement("div");
  const draw=()=>{
    box.innerHTML=`<span class="lbl" style="font-size:13px">${esc(f.label)}</span>`;
    (state[f.id]||[]).forEach((row,i)=>{
      const div=document.createElement("div"); div.className="repeat-row";
      div.innerHTML=`
        <div class="row-head"><b>Issue ${i+1}</b>
          <button type="button" class="small danger" data-del="${i}">Remove</button></div>
        <div class="two-col">
          <label class="field"><span class="lbl">Issue no.</span><input type="text" data-k="no" value="${esc(row.no)}"></label>
          <label class="field"><span class="lbl">Date</span><input type="text" data-k="date" value="${esc(row.date)}"></label>
        </div>
        <label class="field"><span class="lbl">Description of revision</span><input type="text" data-k="desc" value="${esc(row.desc)}"></label>
        <label class="field"><span class="lbl">Reviewed by</span><input type="text" data-k="by" value="${esc(row.by)}"></label>`;
      div.querySelectorAll("[data-k]").forEach(inp=>inp.addEventListener("input",e=>{
        state[f.id][i][e.target.dataset.k]=e.target.value; persist(); renderDoc();
      }));
      div.querySelector("[data-del]").addEventListener("click",()=>{
        state[f.id].splice(i,1); persist(); draw(); renderDoc();
      });
      box.appendChild(div);
    });
    const add=document.createElement("button");
    add.type="button"; add.className="secondary small"; add.textContent="+ Add issue";
    add.addEventListener("click",()=>{
      state[f.id].push({no:String((state[f.id].length||0)+1),date:"",desc:"",by:""});
      persist(); draw(); renderDoc();
    });
    box.appendChild(add);
  };
  draw(); return box;
}

/* ---- company logo upload ---- */
function buildLogo(f){
  const box=document.createElement("div");
  const draw=()=>{
    box.innerHTML=`<span class="lbl" style="font-size:13px">${esc(f.label)}</span>`+
                  (f.help?`<span class="help">${esc(f.help)}</span>`:"");
    if(v(f.id)){
      const img=document.createElement("img");
      img.src=v(f.id);
      img.style.cssText="max-width:180px;max-height:80px;display:block;margin:4px 0 6px;border:1px solid var(--line);padding:4px;background:#fff";
      box.appendChild(img);
      const rm=document.createElement("button");
      rm.type="button"; rm.className="small danger"; rm.textContent="Remove logo";
      rm.addEventListener("click",()=>{ state[f.id]=""; persist(); draw(); renderDoc(); });
      box.appendChild(rm);
    }
    const inp=document.createElement("input");
    inp.type="file"; inp.accept="image/*"; inp.style.marginTop="6px";
    inp.addEventListener("change",e=>{
      const file=e.target.files[0]; if(!file) return;
      const r=new FileReader();
      r.onload=()=>{ state[f.id]=r.result; persist(); draw(); renderDoc(); };
      r.readAsDataURL(file);
    });
    box.appendChild(inp);
  };
  draw(); return box;
}

/* Built-in Google Maps API key. This is used automatically so the map
   features work without anyone pasting a key. A key entered in the form
   (Company branding) overrides it. NOTE: this key is visible in the public
   site source, so it MUST be restricted in Google Cloud to this site's web
   address (HTTP referrer) and to the 5 APIs the tool uses. */
const DEFAULT_MAPS_KEY = "AIzaSyANo2Q7OehYzHTTgMTxRr5ISamf5IradcM";   // restricted Mostlane key
function effectiveMapsKey(){ return (v("_mapsKey")||"").trim() || DEFAULT_MAPS_KEY; }

let _mapsReady=false,_mapsLoading=false,_mapsQueue=[];
const mapsAvailable = () => !!effectiveMapsKey();

function loadMaps(cb){
  if(_mapsReady){ cb&&cb(); return; }
  if(!mapsAvailable()){ cb&&cb(new Error("no-key")); return; }
  _mapsQueue.push(cb);
  if(_mapsLoading) return;
  _mapsLoading=true;
  window.__mostlaneMapsReady=function(){
    _mapsReady=true; _mapsLoading=false;
    _mapsQueue.splice(0).forEach(f=>f&&f());
  };
  const s=document.createElement("script");
  s.async=true;
  s.onerror=()=>{ _mapsLoading=false; _mapsQueue.splice(0).forEach(f=>f&&f(new Error("load-failed")));
    alert("Could not load Google Maps. Check the API key and that the required APIs are enabled."); };
  s.src="https://maps.googleapis.com/maps/api/js?key="+encodeURIComponent(effectiveMapsKey())+
        "&libraries=places,drawing,geometry&callback=__mostlaneMapsReady&v=quarterly";
  document.head.appendChild(s);
}

function geocodeSite(cb){
  if(state.siteLatLng){ cb(state.siteLatLng); return; }
  const addr=(v("siteAddress")||"").replace(/\n/g,", ").trim();
  if(!addr){ cb(null); return; }
  new google.maps.Geocoder().geocode({address:addr,region:"GB"},(res,status)=>{
    if(status==="OK"&&res[0]){
      const l=res[0].geometry.location;
      state.siteLatLng={lat:l.lat(),lng:l.lng()}; persist(); cb(state.siteLatLng);
    }else cb(null);
  });
}

function brandHex(){ return "0x"+(v("_brand")||"#1b5a9b").replace("#",""); }

/* Small "caret" (the two wings of an arrowhead) at the end of the access
   route, angled from the route's final heading. Local planar approximation. */
function routeArrowhead(pts){
  if(!pts || pts.length<2) return null;
  const tip=pts[pts.length-1], prev=pts[pts.length-2];
  const mPerLat=111320, mPerLng=111320*Math.cos(tip.lat*Math.PI/180);
  let dx=(tip.lng-prev.lng)*mPerLng, dy=(tip.lat-prev.lat)*mPerLat;
  const len=Math.hypot(dx,dy); if(!len) return null;
  dx/=len; dy/=len;
  const ARM=14, ANG=30*Math.PI/180;
  const wing=(sign)=>{
    const ca=Math.cos(sign*ANG), sa=Math.sin(sign*ANG);
    const rx=(-dx)*ca-(-dy)*sa, ry=(-dx)*sa+(-dy)*ca;
    return { lat: tip.lat + (ry*ARM)/mPerLat, lng: tip.lng + (rx*ARM)/mPerLng };
  };
  return [wing(1), tip, wing(-1)];
}

/* Build the static-map image for the inserted COMPOUND view (current centre +
   zoom from the modal, plus whatever pin / box / route was drawn). */
function buildCompoundStatic(clat,clng,zoom,maptype){
  const col="0x"+(state.compoundBoxColor||v("_brand")||"#1b5a9b").replace("#","");
  const p=["size=640x420","scale=2","maptype="+(maptype||"hybrid"),
           "center="+clat+","+clng,"zoom="+Math.round(zoom),
           "key="+encodeURIComponent(effectiveMapsKey())];
  if(state.compoundRect && state.compoundRect.length>1){
    const pts=state.compoundRect.concat([state.compoundRect[0]]).map(c=>c.lat+","+c.lng).join("%7C");
    p.push("path=color:"+col+"ff%7Cweight:3%7Cfillcolor:"+col+"55%7C"+pts);
  }
  if(state.compoundRoute && state.compoundRoute.length>1){
    p.push("path=color:0xe02020ff%7Cweight:4%7C"+state.compoundRoute.map(c=>c.lat+","+c.lng).join("%7C"));
    const head=routeArrowhead(state.compoundRoute);
    if(head) p.push("path=color:0xe02020ff%7Cweight:4%7C"+head.map(c=>c.lat+","+c.lng).join("%7C"));
  }
  if(state.compoundPin) p.push("markers=color:red%7C"+state.compoundPin.lat+","+state.compoundPin.lng);
  return "https://maps.googleapis.com/maps/api/staticmap?"+p.join("&");
}

/* Build the static-map image for the inserted ROUTE view (current centre +
   zoom, S/H markers and the driving polyline). */
function buildRouteStatic(clat,clng,zoom){
  const bc=brandHex();
  const p=["size=640x430","scale=2","center="+clat+","+clng,"zoom="+Math.round(zoom),
           "key="+encodeURIComponent(effectiveMapsKey())];
  p.push("markers=color:green%7Clabel:S%7C"+state.siteLatLng.lat+","+state.siteLatLng.lng);
  p.push("markers=color:red%7Clabel:H%7C"+state.hospitalLatLng.lat+","+state.hospitalLatLng.lng);
  if(state.hospitalPolyline){
    p.push("path=weight:4%7Ccolor:"+bc+"ff%7Cenc:"+encodeURIComponent(state.hospitalPolyline));
  }else if(state.hospitalStraight){
    p.push("path=weight:4%7Ccolor:"+bc+"ff%7Cgeodesic:true%7C"+state.hospitalStraight.map(c=>c.lat+","+c.lng).join("%7C"));
  }
  return "https://maps.googleapis.com/maps/api/staticmap?"+p.join("&");
}

/* ---- generic modal shell ---- */
function openModal(title){
  const ov=document.createElement("div"); ov.className="modal-overlay";
  ov.innerHTML=`<div class="modal"><div class="modal-head"><span>${esc(title)}</span>`+
    `<button class="mx" type="button" aria-label="Close">&times;</button></div>`+
    `<div class="modal-body"></div><div class="modal-foot"></div></div>`;
  document.body.appendChild(ov);
  const close=()=>ov.remove();
  ov.querySelector(".mx").onclick=close;
  ov.addEventListener("click",e=>{ if(e.target===ov) close(); });
  return { body:ov.querySelector(".modal-body"), foot:ov.querySelector(".modal-foot"), close };
}

/* ---- compound location modal ---- */
function openCompoundModal(){
  const {body,foot,close}=openModal("Compound location & access route");
  body.innerHTML=`<input class="map-search" type="text" placeholder="Search an address or place to move the map…">
    <div class="tools">
      <button type="button" class="small secondary" data-act="pin">Drop / move pin</button>
      <button type="button" class="small secondary" data-act="area">Draw / edit compound area</button>
      <button type="button" class="small secondary" data-act="route">Draw access route</button>
      <button type="button" class="small danger" data-act="clear">Clear</button>
      <label style="display:inline-flex;align-items:center;gap:5px;font-size:12px">Area colour
        <input type="color" data-areacolor style="width:42px;height:28px;padding:1px;border:1px solid var(--line);border-radius:4px;cursor:pointer"></label>
    </div>
    <div class="map"></div>
    <p class="help" style="margin:8px 0 0">Add the area, then drag its corners — drag a faint <b>mid-point handle</b> to add a corner (square → octagon). Pan &amp; zoom to frame, then <b>Insert image</b>.</p>`;
  foot.innerHTML=`<span class="help">Satellite view</span>
    <span><button type="button" class="secondary" data-act="cancel">Close</button>
    <button type="button" data-act="insert">Insert image</button></span>`;
  loadMaps(err=>{
    if(err){ body.innerHTML='<p class="help">Google Maps failed to load — check the API key / enabled APIs.</p>'; return; }
    geocodeSite(site=>{
      const brand=v("_brand")||"#1b5a9b";
      const center=state.compoundPin||site||{lat:50.8806,lng:-1.8757};
      const map=new google.maps.Map(body.querySelector(".map"),
        {center,zoom:18,mapTypeId:"hybrid",tilt:0,streetViewControl:false});
      const ac=new google.maps.places.Autocomplete(body.querySelector(".map-search"),{fields:["geometry"]});
      ac.bindTo("bounds",map);
      ac.addListener("place_changed",()=>{ const pl=ac.getPlace();
        if(pl.geometry){ pl.geometry.viewport?map.fitBounds(pl.geometry.viewport):(map.setCenter(pl.geometry.location),map.setZoom(18)); } });

      let marker=null,poly=null,routeLine=null,pinMode=false;
      let areaColor=state.compoundBoxColor||brand;
      body.querySelector("[data-areacolor]").value=areaColor;

      function setMarker(pos){ const p={lat:pos.lat,lng:pos.lng};
        if(marker) marker.setPosition(p);
        else{ marker=new google.maps.Marker({position:p,map,draggable:true});
          marker.addListener("dragend",e=>{ state.compoundPin={lat:e.latLng.lat(),lng:e.latLng.lng()}; persist(); }); }
        state.compoundPin=p; persist(); }
      function attachPoly(polygon){ if(poly) poly.setMap(null);
        poly=polygon; poly.setMap(map); poly.setEditable(true); poly.setDraggable(true);
        poly.setOptions({fillColor:areaColor,fillOpacity:.3,strokeColor:areaColor,strokeWeight:2});
        const save=()=>{ state.compoundRect=poly.getPath().getArray().map(p=>({lat:p.lat(),lng:p.lng()})); persist(); };
        const path=poly.getPath(); ["set_at","insert_at","remove_at"].forEach(ev=>path.addListener(ev,save));
        poly.addListener("dragend",save); save(); }
      function defaultSquare(){ const c=map.getCenter(),lat=c.lat(),lng=c.lng();
        const dLat=45/111320, dLng=45/(111320*Math.cos(lat*Math.PI/180));
        return [{lat:lat+dLat,lng:lng-dLng},{lat:lat+dLat,lng:lng+dLng},{lat:lat-dLat,lng:lng+dLng},{lat:lat-dLat,lng:lng-dLng}]; }
      function attachRoute(line){ if(routeLine) routeLine.setMap(null);
        routeLine=line; routeLine.setMap(map); routeLine.setEditable(true);
        const save=()=>{ state.compoundRoute=routeLine.getPath().getArray().map(p=>({lat:p.lat(),lng:p.lng()})); persist(); };
        const path=routeLine.getPath(); ["set_at","insert_at","remove_at"].forEach(ev=>path.addListener(ev,save)); save(); }

      if(state.compoundPin) setMarker(state.compoundPin);
      if(state.compoundRoute && state.compoundRoute.length>1)
        attachRoute(new google.maps.Polyline({path:state.compoundRoute.map(p=>({lat:p.lat,lng:p.lng})),strokeColor:"#e02020",strokeWeight:4,strokeOpacity:.95}));
      if(state.compoundRect && state.compoundRect.length>1)
        attachPoly(new google.maps.Polygon({paths:state.compoundRect.map(p=>({lat:p.lat,lng:p.lng}))}));

      const dm=new google.maps.drawing.DrawingManager({drawingControl:false,
        polylineOptions:{strokeColor:"#e02020",strokeWeight:4,strokeOpacity:.95}});
      dm.setMap(map);
      dm.addListener("polylinecomplete",line=>{ dm.setDrawingMode(null); attachRoute(line); });
      map.addListener("click",e=>{ if(pinMode) setMarker({lat:e.latLng.lat(),lng:e.latLng.lng()}); });

      body.querySelector('[data-areacolor]').addEventListener("input",e=>{
        areaColor=e.target.value; state.compoundBoxColor=areaColor; persist();
        if(poly) poly.setOptions({fillColor:areaColor,strokeColor:areaColor}); });
      body.querySelector('[data-act="pin"]').onclick  =()=>{ pinMode=true;  dm.setDrawingMode(null); };
      body.querySelector('[data-act="area"]').onclick =()=>{ pinMode=false; dm.setDrawingMode(null);
        if(!poly) attachPoly(new google.maps.Polygon({paths:defaultSquare()})); };
      body.querySelector('[data-act="route"]').onclick=()=>{ pinMode=false; dm.setDrawingMode(google.maps.drawing.OverlayType.POLYLINE); };
      body.querySelector('[data-act="clear"]').onclick=()=>{
        if(marker){marker.setMap(null);marker=null;} if(poly){poly.setMap(null);poly=null;} if(routeLine){routeLine.setMap(null);routeLine=null;}
        state.compoundPin=null; state.compoundRect=null; state.compoundRoute=null; persist(); };
      foot.querySelector('[data-act="cancel"]').onclick=close;
      foot.querySelector('[data-act="insert"]').onclick=()=>{
        const c=map.getCenter();
        state.compoundImg=buildCompoundStatic(c.lat(),c.lng(),map.getZoom(),map.getMapTypeId());
        persist(); buildForm(); renderDoc(); close();
      };
    });
  });
}

/* ---- A&E / route planner modal ---- */
function openHospitalModal(){
  const {body,foot,close}=openModal("Local A&E — route planner");
  body.innerHTML=`<input class="map-search" type="text" placeholder="Search a hospital or destination…">
    <div class="tools"><button type="button" class="small" data-act="suggest">Suggest local A&amp;E</button></div>
    <div class="ae-list" data-list></div>
    <div class="map"></div>
    <p class="rinfo" data-info style="margin:8px 0 0"></p>`;
  foot.innerHTML=`<span class="help">Pan &amp; zoom to frame, then Insert</span>
    <span><button type="button" class="secondary" data-act="cancel">Close</button>
    <button type="button" data-act="insert">Insert image</button></span>`;
  const info=body.querySelector("[data-info]"), list=body.querySelector("[data-list]");
  loadMaps(err=>{
    if(err){ body.innerHTML='<p class="help">Google Maps failed to load — check the API key / enabled APIs.</p>'; return; }
    geocodeSite(site=>{
      const center=site||{lat:50.8806,lng:-1.8757};
      const map=new google.maps.Map(body.querySelector(".map"),{center,zoom:12,streetViewControl:false});
      const svc=new google.maps.places.PlacesService(map);
      let line=null,sMark=null,hMark=null;
      function clearOverlay(){ [line,sMark,hMark].forEach(o=>o&&o.setMap(null)); line=sMark=hMark=null; }
      function straightMiles(toLatLng){
        return google.maps.geometry.spherical.computeDistanceBetween(
          new google.maps.LatLng(site.lat,site.lng), toLatLng)/1609.344;
      }
      function drawPath(loc,path,geodesic){
        clearOverlay();
        sMark=new google.maps.Marker({position:site,map,label:"S",title:"Site"});
        hMark=new google.maps.Marker({position:loc,map,label:"H",title:state.hospitalName});
        line=new google.maps.Polyline({path,map,geodesic:!!geodesic,strokeColor:v("_brand")||"#1b5a9b",strokeWeight:4});
        const b=new google.maps.LatLngBounds(); path.forEach(p=>b.extend(p)); map.fitBounds(b);
      }
      // Modern Routes API — the legacy Directions API is not available on newer
      // Google projects, so we use Routes API (which is enabled) for the road route.
      function routesRoute(o,d){
        return fetch("https://routes.googleapis.com/directions/v2:computeRoutes",{
          method:"POST",
          headers:{"Content-Type":"application/json","X-Goog-Api-Key":effectiveMapsKey(),
            "X-Goog-FieldMask":"routes.distanceMeters,routes.duration,routes.polyline.encodedPolyline"},
          body:JSON.stringify({
            origin:{location:{latLng:{latitude:o.lat,longitude:o.lng}}},
            destination:{location:{latLng:{latitude:d.lat,longitude:d.lng}}},
            travelMode:"DRIVE", polylineEncoding:"ENCODED_POLYLINE"})
        }).then(r=>r.json());
      }

      function chooseDest(name,addr,loc){
        state.hospitalName=name||"";
        state.hospitalAddress=(addr||"").replace(/,\s*/g,"\n");
        state.hospitalLatLng={lat:loc.lat(),lng:loc.lng()};
        const dest={lat:loc.lat(),lng:loc.lng()};
        info.textContent="Calculating route…"; persist();
        // 1) Routes API — full road route + drive distance + time
        routesRoute(site,dest).then(j=>{
          const rt=j&&j.routes&&j.routes[0];
          if(rt&&rt.polyline&&rt.polyline.encodedPolyline){
            const miles=(rt.distanceMeters/1609.344).toFixed(1);
            const mins=Math.round(parseInt(rt.duration,10)/60);
            state.hospitalPolyline=rt.polyline.encodedPolyline; state.hospitalStraight=null;
            state.hospitalRouteText=miles+" miles • approx. "+mins+" mins by road";
            drawPath(loc, google.maps.geometry.encoding.decodePath(rt.polyline.encodedPolyline), false);
            info.textContent=state.hospitalRouteText; persist(); return;
          }
          throw new Error((j&&j.error&&j.error.message)||"no route");
        }).catch(()=>{
          // 2) Distance Matrix — real drive distance + time (straight line drawn)
          new google.maps.DistanceMatrixService().getDistanceMatrix(
            {origins:[site],destinations:[dest],travelMode:google.maps.TravelMode.DRIVING,unitSystem:google.maps.UnitSystem.IMPERIAL},
            (dm,dst)=>{
              const el = dm && dm.rows && dm.rows[0] && dm.rows[0].elements[0];
              state.hospitalPolyline=""; state.hospitalStraight=[{lat:site.lat,lng:site.lng},dest];
              if(dst==="OK" && el && el.status==="OK"){
                state.hospitalRouteText=el.distance.text+" • approx. "+el.duration.text+" by road";
                drawPath(loc,[site,dest],true);
                info.textContent=state.hospitalRouteText; persist(); return;
              }
              // 3) final fallback — straight-line distance
              const mi=straightMiles(loc);
              state.hospitalRouteText="≈ "+mi.toFixed(1)+" miles (straight line)";
              drawPath(loc,[site,dest],true);
              info.innerHTML=esc(state.hospitalRouteText)+
                ` <span class="help">— drive distance unavailable. Enable the Routes API or Distance Matrix API on the Maps key.</span>`;
              persist();
            });
        });
      }

      const ac=new google.maps.places.Autocomplete(body.querySelector(".map-search"),{fields:["name","formatted_address","geometry"]});
      ac.addListener("place_changed",()=>{ const pl=ac.getPlace(); if(pl.geometry) chooseDest(pl.name,pl.formatted_address,pl.geometry.location); });

      body.querySelector('[data-act="suggest"]').onclick=()=>{
        if(!site){ list.innerHTML='<p class="help">Site address not found — check section 1.</p>'; return; }
        list.innerHTML='<p class="help">Searching…</p>';
        svc.textSearch({query:"A&E accident and emergency hospital",location:new google.maps.LatLng(site.lat,site.lng),radius:32000},(res,st)=>{
          if(st!==google.maps.places.PlacesServiceStatus.OK||!res||!res.length){ list.innerHTML='<p class="help">No A&E found nearby.</p>'; return; }
          list.innerHTML="";
          res.map(p=>({p,mi:straightMiles(p.geometry.location)}))
             .sort((a,b)=>a.mi-b.mi).slice(0,6)
             .forEach(({p,mi})=>{
               const r=document.createElement("div"); r.className="repeat-row";
               r.innerHTML=`<b>${esc(p.name)}</b> <span class="rinfo">${mi.toFixed(1)} mi</span><br><span class="help">${esc(p.formatted_address||"")}</span><br>`;
               const b=document.createElement("button"); b.type="button"; b.className="small secondary"; b.textContent="Use & route";
               b.onclick=()=>chooseDest(p.name,p.formatted_address,p.geometry.location);
               r.appendChild(b); list.appendChild(r);
             });
        });
      };

      // restore a previously chosen hospital/route for editing
      if(state.hospitalLatLng && site)
        chooseDest(state.hospitalName||"Hospital",(state.hospitalAddress||"").replace(/\n/g,", "),
          new google.maps.LatLng(state.hospitalLatLng.lat,state.hospitalLatLng.lng));

      foot.querySelector('[data-act="cancel"]').onclick=close;
      foot.querySelector('[data-act="insert"]').onclick=()=>{
        if(!state.siteLatLng||!state.hospitalLatLng||(!state.hospitalPolyline&&!state.hospitalStraight)){
          alert("Pick a hospital and wait for the route/distance to calculate first."); return; }
        const c=map.getCenter();
        state.hospitalImg=buildRouteStatic(c.lat(),c.lng(),map.getZoom());
        persist(); buildForm(); renderDoc(); close();
      };
    });
  });
}

/* ---- compound field (opens the modal) ---- */
function buildCompoundMap(f){
  const box=document.createElement("div");
  const draw=()=>{
    box.innerHTML=`<span class="lbl" style="font-size:13px">${esc(f.label)}</span>`+(f.help?`<span class="help">${esc(f.help)}</span>`:"");
    if(!mapsAvailable()){ const m=document.createElement("p"); m.className="help"; m.textContent="Maps unavailable (no API key set)."; box.appendChild(m); return; }
    const open=document.createElement("button"); open.type="button"; open.className="small";
    open.textContent=state.compoundImg?"Edit compound map":"Open compound map"; open.onclick=openCompoundModal;
    box.appendChild(open);
    if(state.compoundImg){
      const img=document.createElement("img"); img.src=state.compoundImg;
      img.style.cssText="display:block;max-width:100%;margin:8px 0;border:1px solid var(--line);border-radius:4px"; box.appendChild(img);
      const rm=document.createElement("button"); rm.type="button"; rm.className="small danger"; rm.textContent="Remove image";

    }else{ const s=document.createElement("p"); s.className="help"; s.textContent="No image inserted yet."; box.appendChild(s); }
  };
  draw(); return box;
}

/* ---- A&E field (opens the route planner modal) ---- */
function buildHospitalFinder(f){
  const box=document.createElement("div");
  const draw=()=>{
    box.innerHTML=`<span class="lbl" style="font-size:13px">${esc(f.label)}</span>`+(f.help?`<span class="help">${esc(f.help)}</span>`:"");
    if(!mapsAvailable()){ const m=document.createElement("p"); m.className="help"; m.textContent="Maps unavailable (no API key set)."; box.appendChild(m); return; }
    const open=document.createElement("button"); open.type="button"; open.className="small";
    open.textContent=state.hospitalImg?"Edit route planner":"Open A&E / route planner"; open.onclick=openHospitalModal;
    box.appendChild(open);
